<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufiyan Absar | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #020617;
    color: #fff;
    overflow-x: hidden;
}

/* Particle Canvas */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    backdrop-filter: blur(10px);
}

nav h1 {
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
}

nav ul {
    display: flex;
    gap: 20px;
    list-style: none;
}

nav a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* Hero */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    text-align: center;
}

.hero h2 {
    font-size: 3rem;
}

.hero span {
    color: #38bdf8;
    text-shadow: 0 0 15px #38bdf8;
}

.typing {
    font-size: 1.3rem;
    color: #cbd5e1;
}

/* Button */
.btn {
    padding: 12px 25px;
    border-radius: 10px;
    background: linear-gradient(45deg, #38bdf8, #0ea5e9);
    border: none;
    cursor: pointer;
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* Sections */
section {
    padding: 80px 50px;
    text-align: center;
}

/* Glass Cards */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

/* Projects */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

/* Contact */
.contact input, .contact textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    color: white;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: black;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
    <h1>Sufiyan Absar</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <h2>Hi, I'm <span>Sufiyan Absar</span></h2>
    <div class="typing" id="typing"></div>
    <button class="btn">Explore My Work</button>
</div>

<section id="about">
    <h2>About Me</h2>
    <p>I build educational bot websites and powerful digital tools for students — completely free.</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">Educational Bot</div>
        <div class="card">Quiz Platform</div>
        <div class="card">Study Tools</div>
    </div>
</section>

<section id="contact" class="contact">
    <h2>Contact Me</h2>
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
</section>

<a href="https://wa.me/your-number" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<footer>
    <p>© 2026 Sufiyan Absar</p>
</footer>

<script>
// Typing Effect
const text = ["Educational Bot Developer", "Web Creator", "Tech Enthusiast"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
    current = text[i];
    if (isDeleting) {
        document.getElementById("typing").textContent = current.substring(0, j--);
    } else {
        document.getElementById("typing").textContent = current.substring(0, j++);
    }

    if (!isDeleting && j === current.length) {
        isDeleting = true;
        setTimeout(type, 1000);
        return;
    }

    if (isDeleting && j === 0) {
        isDeleting = false;
        i = (i + 1) % text.length;
    }

    setTimeout(type, isDeleting ? 50 : 100);
}
type();

// Particle Background
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#38bdf8";
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
